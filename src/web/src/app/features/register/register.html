<div class="auth-wrap">
  <form class="auth surface" [formGroup]="form" (ngSubmit)="submit()">
    <header class="auth__head">
      <span class="eyebrow">Join JobBoard</span>
      <h1>Create your account</h1>
      <p class="auth__lede">Apply as a candidate, or post roles as an employer.</p>
    </header>

    <label class="field">
      <span class="field__label">Email</span>
      <input
        type="email"
        formControlName="email"
        autocomplete="username"
        placeholder="you@company.dev"
      />
      @if (form.controls.email.touched && form.controls.email.invalid) {
        <span class="field__error">Enter a valid email.</span>
      }
    </label>

    <label class="field">
      <span class="field__label">Password</span>
      <input
        type="password"
        formControlName="password"
        autocomplete="new-password"
        placeholder="At least 8 characters"
      />
      @if (form.controls.password.touched && form.controls.password.invalid) {
        <span class="field__error">At least 8 characters.</span>
      }
    </label>

    <!-- [value] binds the raw numeric AccountRole to the FormControl — RadioControlValueAccessor keeps
         the JS value (unlike <select><option> which needs [ngValue]), so the enum comparison below works. -->
    <fieldset class="role">
      <legend class="field__label">I am a…</legend>
      <label
        class="role__option"
        [class.role__option--active]="form.controls.role.value === AccountRole.Candidate"
      >
        <input type="radio" formControlName="role" [value]="AccountRole.Candidate" />
        <span class="role__name">Candidate</span>
        <span class="role__desc">Find and apply to roles</span>
      </label>
      <label
        class="role__option"
        [class.role__option--active]="form.controls.role.value === AccountRole.Employer"
      >
        <input type="radio" formControlName="role" [value]="AccountRole.Employer" />
        <span class="role__name">Employer</span>
        <span class="role__desc">Post jobs and hire</span>
      </label>
    </fieldset>

    @if (error(); as message) {
      <p class="auth__error" role="alert">{{ message }}</p>
    }

    <button type="submit" class="btn btn--primary btn--block" [disabled]="submitting()">
      {{ submitting() ? 'Creating…' : 'Create account' }}
    </button>

    <p class="auth__alt">Already have an account? <a routerLink="/login">Log in</a></p>
  </form>
</div>
