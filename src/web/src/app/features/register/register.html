<form class="auth" [formGroup]="form" (ngSubmit)="submit()">
  <h1>Create an account</h1>

  <label class="field">
    <span class="field__label">Email</span>
    <input type="email" formControlName="email" autocomplete="username" />
    @if (form.controls.email.touched && form.controls.email.invalid) {
      <span class="field__error">Enter a valid email.</span>
    }
  </label>

  <label class="field">
    <span class="field__label">Password</span>
    <input type="password" formControlName="password" autocomplete="new-password" />
    @if (form.controls.password.touched && form.controls.password.invalid) {
      <span class="field__error">At least 8 characters.</span>
    }
  </label>

  <label class="field">
    <span class="field__label">I am a…</span>
    <select formControlName="role">
      <option [ngValue]="AccountRole.Candidate">Candidate</option>
      <option [ngValue]="AccountRole.Employer">Employer</option>
    </select>
  </label>

  @if (error(); as message) {
    <p class="auth__error" role="alert">{{ message }}</p>
  }

  <button type="submit" class="auth__submit" [disabled]="submitting()">
    {{ submitting() ? 'Creating…' : 'Create account' }}
  </button>

  <p class="auth__alt">Already have an account? <a routerLink="/login">Log in</a></p>
</form>
