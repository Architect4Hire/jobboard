<form class="auth" [formGroup]="form" (ngSubmit)="submit()">
  <h1>Log in</h1>

  <label class="field">
    <span class="field__label">Email</span>
    <input type="email" formControlName="email" autocomplete="username" />
    @if (form.controls.email.touched && form.controls.email.invalid) {
      <span class="field__error">Enter a valid email.</span>
    }
  </label>

  <label class="field">
    <span class="field__label">Password</span>
    <input type="password" formControlName="password" autocomplete="current-password" />
    @if (form.controls.password.touched && form.controls.password.invalid) {
      <span class="field__error">A password is required.</span>
    }
  </label>

  @if (error(); as message) {
    <p class="auth__error" role="alert">{{ message }}</p>
  }

  <button type="submit" class="auth__submit" [disabled]="submitting()">
    {{ submitting() ? 'Signing in…' : 'Log in' }}
  </button>

  <p class="auth__alt">No account? <a routerLink="/register">Register</a></p>
</form>
