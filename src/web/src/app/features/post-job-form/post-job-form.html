<form class="post-job" [formGroup]="form" (ngSubmit)="submit()">
  <h1>Post a job</h1>

  <label class="field">
    <span class="field__label">Title</span>
    <input type="text" formControlName="title" />
    @if (form.controls.title.touched && form.controls.title.invalid) {
      <span class="field__error">A title is required.</span>
    }
  </label>

  <label class="field">
    <span class="field__label">Description</span>
    <textarea rows="6" formControlName="description"></textarea>
    @if (form.controls.description.touched && form.controls.description.invalid) {
      <span class="field__error">A description is required.</span>
    }
  </label>

  <label class="field">
    <span class="field__label">Location</span>
    <input type="text" formControlName="location" />
    @if (form.controls.location.touched && form.controls.location.invalid) {
      <span class="field__error">A location is required.</span>
    }
  </label>

  <div class="salary">
    <label class="field">
      <span class="field__label">Salary min</span>
      <input type="number" formControlName="salaryMin" min="0" />
    </label>
    <label class="field">
      <span class="field__label">Salary max</span>
      <input type="number" formControlName="salaryMax" min="0" />
    </label>
    <label class="field field--currency">
      <span class="field__label">Currency</span>
      <input type="text" formControlName="currency" maxlength="3" />
    </label>
  </div>

  <label class="field">
    <span class="field__label">Categories <em>(comma-separated)</em></span>
    <input type="text" formControlName="categories" placeholder="Engineering, Remote" />
  </label>

  <label class="field">
    <span class="field__label">Tags <em>(comma-separated)</em></span>
    <input type="text" formControlName="tags" placeholder="Angular, .NET" />
  </label>

  @if (error(); as message) {
    <p class="post-job__error" role="alert">{{ message }}</p>
  }

  <button type="submit" class="post-job__submit" [disabled]="submitting()">
    {{ submitting() ? 'Posting…' : 'Post job' }}
  </button>
</form>
