<header class="topbar">
  <nav class="topbar__nav">
    <a class="topbar__brand" routerLink="/">JobBoard</a>
    <a routerLink="/jobs" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      Jobs
    </a>
    @if (isEmployer()) {
      <a routerLink="/jobs/new" routerLinkActive="active">Post a job</a>
    }
    @if (isCandidate()) {
      <a routerLink="/applications" routerLinkActive="active">My applications</a>
    }
  </nav>

  <div class="topbar__auth">
    @if (isAuthenticated()) {
      <button type="button" class="topbar__logout" (click)="logout()">Log out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Log in</a>
    }
  </div>
</header>

<main class="content">
  <router-outlet />
</main>
